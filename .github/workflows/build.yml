name: Build GameCrate

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC toolchain
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        run: cmake --build build

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish GUI
        run: |
          dotnet publish src/gui/GameCrate.Gui/GameCrate.Gui.csproj -c Release -r win-x64 --self-contained false -o build/package
          Copy-Item build\gamecrate.exe build\package\gamecrate.exe

      - name: Verify binary
        shell: pwsh
        run: |
          $exe = "build\gamecrate.exe"
          if (-not (Test-Path $exe)) {
            throw "gamecrate.exe was not produced at $exe"
          }
          Get-Item $exe | Format-List FullName, Length, LastWriteTime
          & $exe list-profiles

          $gui = "build\package\GameCrate.Gui.exe"
          if (-not (Test-Path $gui)) {
            throw "GameCrate.Gui.exe was not produced at $gui"
          }
          Get-Item $gui | Format-List FullName, Length, LastWriteTime

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gamecrate-windows-x64
          path: |
            build/gamecrate.exe
            build/package/
            profiles/
            tools/
          retention-days: 30
