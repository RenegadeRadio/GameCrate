name: Build GameCrate

on:
  push:
    branches: [main, "cursor/**"]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-profiles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate example profiles
        run: |
          pip install jsonschema
          python tools/validate-profiles.py

  build-windows:
    needs: validate-profiles
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC toolchain
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        run: cmake --build build

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish GUI (self-contained)
        run: |
          dotnet publish src/gui/GameCrate.Gui/GameCrate.Gui.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishReadyToRun=true `
            -o build/package
          Copy-Item build\gamecrate.exe build\package\gamecrate.exe

      - name: Package release layout
        shell: pwsh
        run: |
          $dest = "release/GameCrate"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item build/package/* $dest -Recurse -Force
          Copy-Item profiles $dest/profiles -Recurse -Force
          Copy-Item tools $dest/tools -Recurse -Force
          Copy-Item package/README.txt $dest/README.txt -Force

      - name: Verify binary
        shell: pwsh
        run: |
          $exe = "release/GameCrate/gamecrate.exe"
          if (-not (Test-Path $exe)) {
            throw "gamecrate.exe was not produced at $exe"
          }
          Get-Item $exe | Format-List FullName, Length, LastWriteTime
          & $exe list-profiles

          $env:GAMECRATE_DATA_ROOT = Join-Path $env:TEMP "gamecrate-ci-data-$PID"
          New-Item -ItemType Directory -Force -Path $env:GAMECRATE_DATA_ROOT | Out-Null
          $smokeId = "ci-smoke-$PID"
          $smokeDir = Join-Path $env:TEMP "gamecrate-smoke-$PID"
          New-Item -ItemType Directory -Force -Path $smokeDir | Out-Null
          & $exe create-profile --id $smokeId --name "CI Smoke" --install-dir $smokeDir --executable C:\Windows\System32\cmd.exe --no-gpu
          if ($LASTEXITCODE -ne 0) { throw "create-profile smoke test failed" }
          & $exe set-executable --profile $smokeId --executable C:\Windows\System32\cmd.exe
          if ($LASTEXITCODE -ne 0) { throw "set-executable smoke test failed" }
          & $exe destroy-profile --profile $smokeId --wipe-data
          if ($LASTEXITCODE -ne 0) { throw "destroy-profile smoke test failed" }

          $gui = "release/GameCrate/GameCrate.Gui.exe"
          if (-not (Test-Path $gui)) {
            throw "GameCrate.Gui.exe was not produced at $gui"
          }
          Get-Item $gui | Format-List FullName, Length, LastWriteTime

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path release/GameCrate -DestinationPath GameCrate-windows-x64.zip -Force

      - name: Refresh winget manifest (tagged releases)
        if: startsWith(github.ref, 'refs/tags/v') && github.ref_name != 'v0.4-latest'
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          .\tools\update-winget-manifest.ps1 -Version $ver -ZipPath GameCrate-windows-x64.zip
          winget validate --manifest "winget\manifests\r\RenegadeRadio\GameCrate\$ver"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gamecrate-windows-x64
          path: |
            GameCrate-windows-x64.zip
            release/GameCrate/
          retention-days: 30

  release:
    needs: build-windows
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: gamecrate-windows-x64
          path: dist

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'v0.4-latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && format('GameCrate {0}', github.ref_name) || 'GameCrate v0.4 (latest build)' }}
          body: |
            Windows x64 build from commit ${{ github.sha }}.

            ## Install in a VM
            1. Download **GameCrate-windows-x64.zip** below.
            2. Extract the `GameCrate` folder (e.g. to `C:\Tools\GameCrate`).
            3. Run `GameCrate.Gui.exe` or `gamecrate.exe`.

            Self-contained — no separate .NET install required.

            Docs: https://github.com/${{ github.repository }}/tree/main/docs
          artifacts: dist/GameCrate-windows-x64.zip
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
