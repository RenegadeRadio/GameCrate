name: Build WinDoze

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build build --config Release

      - name: Verify binary
        run: |
          if (-not (Test-Path "build\Release\windoze.exe")) {
            throw "windoze.exe was not produced"
          }
          Get-Item "build\Release\windoze.exe" | Format-List FullName, Length, LastWriteTime

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windoze-windows-x64
          path: |
            build/Release/windoze.exe
            profiles/
            tools/
          retention-days: 30
