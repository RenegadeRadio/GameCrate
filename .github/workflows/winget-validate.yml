name: Validate winget manifest

on:
  push:
    branches: [main, "cursor/**"]
    paths:
      - "winget/**"
      - ".github/workflows/winget-validate.yml"
  pull_request:
    branches: [main]
    paths:
      - "winget/**"
      - ".github/workflows/winget-validate.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find manifest versions
        id: versions
        shell: pwsh
        run: |
          $dirs = Get-ChildItem -Path winget\manifests\r\RenegadeRadio\GameCrate -Directory -ErrorAction SilentlyContinue
          if (-not $dirs) { throw "No winget manifest versions found" }
          $paths = $dirs.FullName -join ';'
          "paths=$paths" >> $env:GITHUB_OUTPUT

      - name: Validate each manifest
        shell: pwsh
        run: |
          $paths = "${{ steps.versions.outputs.paths }}" -split ';'
          foreach ($manifest in $paths) {
            Write-Host "Validating $manifest"
            winget validate --manifest $manifest
            if ($LASTEXITCODE -ne 0) { throw "winget validate failed for $manifest" }
          }
